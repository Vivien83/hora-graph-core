name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # ── Core Rust tests (multi-platform) ──────────────────────
  test:
    name: Test ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --lib --verbose

      - name: Run tests with SQLite
        run: cargo test --features sqlite --verbose

  # ── Clippy + format ───────────────────────────────────────
  lint:
    name: Clippy + fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy (core)
        run: cargo clippy --lib -- -D warnings

      - name: Clippy (SQLite)
        run: cargo clippy --features sqlite -- -D warnings

  # ── C FFI binding ─────────────────────────────────────────
  ffi:
    name: C FFI ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: bindings/c

      - name: Build and test C FFI
        working-directory: bindings/c
        run: cargo test --verbose

      - name: Build release (staticlib + cdylib)
        working-directory: bindings/c
        run: cargo build --release

  # ── WASM binding ──────────────────────────────────────────
  wasm:
    name: WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: bindings/wasm

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        working-directory: bindings/wasm
        run: wasm-pack build --target web

      - name: Test WASM (Node.js)
        working-directory: bindings/wasm
        run: wasm-pack test --node

  # ── Python binding ────────────────────────────────────────
  python:
    name: Python ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: bindings/python

      - name: Install maturin and build
        working-directory: bindings/python
        run: |
          pip install maturin pytest
          maturin develop

      - name: Run Python tests
        working-directory: bindings/python
        run: pytest tests/ -v

  # ── Benchmarks (Linux only, no regression check) ──────────
  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run benchmarks (compile check)
        run: cargo bench --no-run
